version: "1.5"
namespace:
    key: default
    name: Default
flags:
    - key: proceed-to-checkout-color
      name: proceed-to-checkout-color
      type: VARIANT_FLAG_TYPE
      enabled: true
      variants:
        - key: green
          attachment: {}
        - key: red
          attachment: {}
        - key: blue
          attachment: {}
segments:
    - key: demo-segment
      name: demo-segment
      constraints:
        - type: STRING_COMPARISON_TYPE
          property: app
          operator: eq
          value: k9mail
      match_type: ALL_MATCH_TYPE
